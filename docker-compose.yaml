version: '3.8'

services:
    mysql_db:
        image: mysql:latest
        container_name: auth-security-system-mysql
        ports:
            - '3300:3306'
        environment:
            MYSQL_DATABASE: auth_security_system
            MYSQL_ROOT_PASSWORD: password
            MYSQL_USER: admin
            MYSQL_PASSWORD: admin
        volumes:
            - mysql-data:/var/lib/mysql
            - ./db-init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
    mysql-data:
