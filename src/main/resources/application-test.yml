spring:
    # config:
    #     import:
    #         - optional:file:../.env[.properties]

    jpa:
        database: mysql
        database-platform: org.hibernate.dialect.MySQLDialect
        hibernate:
            ddl-auto: create-drop
        properties:
            hibernate:
                '[format_sql]': true
        defer-datasource-initialization: true
        show-sql: true

    # 도커 컴포즈를 자동으로 구성 + 테스트 환경에서 구성 가능
    docker:
        compose:
            skip:
                in-tests: false

    output:
        ansi:
            enabled: ALWAYS

    jwt:
        secret: ${JWT_SECRET}
        access-token-expiration: 30m
        refresh-token-expiration: 7d
